<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Control Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container py-4">
        <header class="pb-3 mb-4 border-bottom d-flex justify-content-between align-items-center">
            <h1 class="h3 mb-0">Bot Control Panel</h1>
            <span id="backend-status-badge" class="badge bg-secondary">Checking Backend...</span>
        </header>


        <div class="card bg-dark border-secondary mb-4">
            <div class="card-header border-secondary">
                <h5 class="mb-0">Controls</h5>
            </div>
            <div class="card-body">
                <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-outline-info action-btn" onclick="checkLogin()" id="btn-login">Check Login</button>
                    <button class="btn btn-primary action-btn" onclick="fullFlow()" id="btn-fetch">Fetch + Generate</button>
                    <button class="btn btn-success action-btn" onclick="startPosting()" id="btn-start">Start Posting</button>
                </div>
            </div>
        </div>


        <div class="card bg-dark border-secondary">
            <div class="card-header border-secondary d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Live Logs</h5>
                <button class="btn btn-sm btn-outline-secondary" onclick="clearLogs()">Clear</button>
            </div>
            <div class="card-body p-0">
                <div id="log-container" class="p-3 font-monospace small"></div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
